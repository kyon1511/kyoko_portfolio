# back/docker-compose.yml
version: '3'
services:
  db:
    image: mysql:8.0
    container_name: portfolio-db
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: portfolio
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
